<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Sweet Finance Diary ✨</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#F43F5E">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@100;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Anuphan', sans-serif; -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #FFC0CB; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#FFF5F7] min-h-screen pb-20">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyALcH0D-G0H6g0yfgLHrxKcYiHZAq7jAGs",
            authDomain: "monney-33caf.firebaseapp.com",
            databaseURL: "https://monney-33caf-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "monney-33caf",
            storageBucket: "monney-33caf.firebasestorage.app",
            messagingSenderId: "709336346002",
            appId: "1:709336346002:web:444bd02c294bd194d6e54b"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const App = () => {
            const [accounts, setAccounts] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [activeAcc, setActiveAcc] = useState('all');
            const [editingId, setEditingId] = useState(null);
            const [showAddAcc, setShowAddAcc] = useState(false);
            const [newAccName, setNewAccName] = useState('');
            const [formData, setFormData] = useState({ description: '', amount: '', type: 'expense', accountId: '', date: new Date().toISOString().split('T')[0] });

            useEffect(() => {
                db.ref('accounts').on('value', snap => {
                    const data = snap.val();
                    if (data) {
                        const list = Object.keys(data).map(k => ({id: k, ...data[k]}));
                        setAccounts(list);
                        if (!formData.accountId && list.length > 0) setFormData(f => ({...f, accountId: list[0].id}));
                    } else {
                        db.ref('accounts').push({name: 'เงินสด 💵', color: 'from-pink-400 to-rose-300'});
                    }
                });
                db.ref('transactions').on('value', snap => {
                    const data = snap.val();
                    if (data) setTransactions(Object.keys(data).map(k => ({id: k, ...data[k]})).reverse());
                    else setTransactions([]);
                });
            }, []);

            const exportExcel = () => {
                const wb = XLSX.utils.book_new();
                const summaryData = accounts.map(acc => {
                    const accTrans = transactions.filter(t => t.accountId === acc.id);
                    const totalIn = accTrans.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
                    const totalOut = accTrans.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
                    return { 'ชื่อบัญชี': acc.name, 'รายรับรวม (฿)': totalIn, 'รายจ่ายรวม (฿)': totalOut, 'ยอดคงเหลือล่าสุด (฿)': totalIn - totalOut };
                });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(summaryData), "สรุปยอดเงินทุกบัญชี");
                accounts.forEach(acc => {
                    const accTransactions = transactions.filter(t => t.accountId === acc.id).slice().reverse();
                    if (accTransactions.length > 0) {
                        let runningBalance = 0;
                        const sheetData = accTransactions.map(t => {
                            if (t.type === 'income') runningBalance += t.amount;
                            else runningBalance -= t.amount;
                            return { 'วันที่': t.date, 'รายการ': t.description, 'ประเภท': t.type === 'income' ? 'รายรับ' : 'รายจ่าย', 'จำนวนเงิน': t.amount, 'ยอดเงินคงเหลือสะสม': runningBalance };
                        });
                        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(sheetData.reverse()), acc.name.substring(0, 31));
                    }
                });
                XLSX.writeFile(wb, "My_Finance_Diary_Report.xlsx");
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.description || !formData.amount) return;
                const payload = {...formData, amount: parseFloat(formData.amount)};
                if (editingId) db.ref(`transactions/${editingId}`).update(payload);
                else db.ref('transactions').push(payload);
                setEditingId(null);
                setFormData({...formData, description: '', amount: ''});
            };

            const stats = useMemo(() => {
                const filtered = transactions.filter(t => activeAcc === 'all' || t.accountId === activeAcc);
                return filtered.reduce((acc, curr) => {
                    if (curr.type === 'income') { acc.in += curr.amount; acc.bal += curr.amount; }
                    else { acc.out += curr.amount; acc.bal -= curr.amount; }
                    return acc;
                }, { in: 0, out: 0, bal: 0 });
            }, [transactions, activeAcc]);

            const groupedTransactions = useMemo(() => {
                const filtered = transactions.filter(t => activeAcc === 'all' || t.accountId === activeAcc);
                const groups = {};
                filtered.forEach(t => {
                    if (!groups[t.date]) groups[t.date] = [];
                    groups[t.date].push(t);
                });
                return groups;
            }, [transactions, activeAcc]);

            return (
                <div className="max-w-6xl mx-auto px-4 pt-8">
                    <h1 className="text-4xl font-black text-rose-500 text-center mb-10 drop-shadow-sm">Diary Finance Cloud ✨</h1>
                    
                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-10">
                        <div className="bg-white p-6 rounded-[2rem] shadow-lg text-center border-b-8 border-pink-100">
                            <p className="text-3xl font-black text-slate-700">฿{stats.bal.toLocaleString()}</p>
                            <p className="text-xs font-bold text-rose-300 uppercase tracking-widest mt-1">ยอดคงเหลือรวม</p>
                        </div>
                        <div className="bg-gradient-to-br from-emerald-400 to-teal-500 p-6 rounded-[2rem] shadow-lg text-white text-center">
                            <p className="text-3xl font-black">฿{stats.in.toLocaleString()}</p>
                            <p className="text-xs font-bold opacity-80 uppercase mt-1">รายรับ</p>
                        </div>
                        <div className="bg-gradient-to-br from-rose-400 to-pink-500 p-6 rounded-[2rem] shadow-lg text-white text-center">
                            <p className="text-3xl font-black">฿{stats.out.toLocaleString()}</p>
                            <p className="text-xs font-bold opacity-80 uppercase mt-1">รายจ่าย</p>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        <div className="lg:col-span-5">
                            <div className="bg-white p-8 rounded-[3rem] shadow-2xl border-4 border-white sticky top-8">
                                <h2 className="font-black text-2xl mb-6 text-slate-700">{editingId ? '🪄 แก้ไขรายการ' : '📔 จดรายการใหม่'}</h2>
                                <form onSubmit={handleSubmit} className="space-y-4">
                                    <div className="flex bg-slate-100 p-2 rounded-2xl">
                                        <button type="button" onClick={() => setFormData({...formData, type: 'income'})} className={`flex-1 py-3 rounded-xl font-bold ${formData.type === 'income' ? 'bg-white shadow-md text-emerald-500' : 'text-slate-400'}`}>รายรับ</button>
                                        <button type="button" onClick={() => setFormData({...formData, type: 'expense'})} className={`flex-1 py-3 rounded-xl font-bold ${formData.type === 'expense' ? 'bg-white shadow-md text-rose-500' : 'text-slate-400'}`}>รายจ่าย</button>
                                    </div>
                                    <select value={formData.accountId} onChange={e => setFormData({...formData, accountId: e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl font-bold text-slate-600 outline-none">
                                        {accounts.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
                                    </select>
                                    <input type="date" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl font-bold text-slate-500 outline-none" />
                                    <input type="text" placeholder="พิมพ์รายการ..." value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none shadow-inner" />
                                    <input type="number" placeholder="0.00" value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} className="w-full p-6 bg-pink-50 rounded-3xl font-black text-4xl text-center text-rose-500 outline-none shadow-inner" />
                                    <button type="submit" className="w-full py-5 bg-gradient-to-r from-pink-500 to-rose-500 text-white font-black text-xl rounded-3xl shadow-xl hover:scale-95 transition-all">บันทึกข้อมูล ✨</button>
                                    <button type="button" onClick={exportExcel} className="w-full py-3 border-2 border-emerald-400 text-emerald-600 font-black rounded-2xl text-sm hover:bg-emerald-50 transition-all mt-2">ส่งออก EXCEL 📑</button>
                                </form>
                            </div>
                        </div>

                        <div className="lg:col-span-7">
                            <div className="bg-white/60 backdrop-blur-lg p-8 rounded-[3rem] border-4 border-white shadow-xl min-h-[500px]">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="font-black text-2xl text-slate-700">ประวัติการใช้จ่าย 👛</h2>
                                    <button onClick={() => setShowAddAcc(true)} className="w-10 h-10 bg-gradient-to-tr from-pink-500 to-rose-400 text-white rounded-2xl font-black text-xl shadow-lg">+</button>
                                </div>
                                
                                <div className="flex gap-2 overflow-x-auto pb-4 mb-8 custom-scrollbar">
                                    <button onClick={() => setActiveAcc('all')} className={`px-6 py-2 rounded-2xl text-xs font-black whitespace-nowrap transition-all ${activeAcc === 'all' ? 'bg-pink-500 text-white shadow-lg' : 'bg-white text-pink-400'}`}>กระเป๋าทั้งหมด</button>
                                    {accounts.map(a => (
                                        <div key={a.id} className="relative group">
                                            <button onClick={() => setActiveAcc(a.id)} className={`px-6 py-2 rounded-2xl text-xs font-black whitespace-nowrap transition-all ${activeAcc === a.id ? 'bg-white text-rose-500 shadow-md ring-2 ring-rose-100' : 'bg-white/50 text-slate-400'}`}>{a.name}</button>
                                            <button onClick={() => {if(confirm('ลบบัญชีนี้?')) db.ref(`accounts/${a.id}`).remove()}} className="absolute -top-2 -right-1 w-5 h-5 bg-rose-500 text-white rounded-full text-[10px] opacity-0 group-hover:opacity-100 flex items-center justify-center shadow-md">✕</button>
                                        </div>
                                    ))}
                                </div>

                                <div className="space-y-8">
                                    {Object.keys(groupedTransactions).sort((a, b) => new Date(b) - new Date(a)).map(date => (
                                        <div key={date} className="space-y-4">
                                            <div className="flex items-center gap-4">
                                                <div className="bg-pink-100 text-rose-500 px-4 py-1 rounded-full text-[11px] font-black shadow-sm">🗓 {date}</div>
                                                <div className="h-[1px] flex-1 bg-gradient-to-r from-pink-100 to-transparent"></div>
                                            </div>
                                            <div className="space-y-3">
                                                {groupedTransactions[date].map(t => (
                                                    <div key={t.id} className="p-5 bg-white rounded-[2rem] shadow-sm flex justify-between items-center group border-2 border-transparent hover:border-pink-100 transition-all">
                                                        <div className="flex items-center gap-4">
                                                            <div className={`w-2 h-10 rounded-full ${t.type === 'income' ? 'bg-emerald-400' : 'bg-rose-300'}`}></div>
                                                            <div>
                                                                <p className="font-bold text-slate-700 text-lg">{t.description}</p>
                                                                <p className="text-[10px] text-pink-300 font-black uppercase tracking-widest">{accounts.find(a => a.id === t.accountId)?.name || 'ทั่วไป'}</p>
                                                            </div>
                                                        </div>
                                                        <div className="flex items-center gap-4">
                                                            <p className={`text-xl font-black ${t.type === 'income' ? 'text-emerald-500' : 'text-slate-600'}`}>
                                                                {t.type === 'income' ? '+' : '-'}฿{t.amount.toLocaleString()}
                                                            </p>
                                                            <div className="flex gap-1 md:opacity-0 group-hover:opacity-100 transition-all">
                                                                <button onClick={() => {setEditingId(t.id); setFormData(t); window.scrollTo({top:0, behavior:'smooth'})}} className="p-2 text-indigo-400">✎</button>
                                                                <button onClick={() => {if(confirm('ลบรายการ?')) db.ref(`transactions/${t.id}`).remove()}} className="p-2 text-rose-400">🗑</button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    {showAddAcc && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-rose-100/60 backdrop-blur-md p-6">
                            <div className="bg-white w-full max-w-sm p-10 rounded-[4rem] shadow-2xl border-[12px] border-pink-50 text-center animate-in zoom-in-95">
                                <div className="text-5xl mb-4">🌈</div>
                                <h3 className="text-2xl font-black text-slate-700 mb-6">เพิ่มกระเป๋าใหม่จ้า</h3>
                                <input autoFocus type="text" value={newAccName} onChange={e => setNewAccName(e.target.value)} placeholder="ชื่อบัญชี เช่น เงินออม" className="w-full px-6 py-4 bg-slate-50 rounded-2xl outline-none font-bold text-center mb-8 border-2 focus:border-pink-300 transition-all" />
                                <div className="flex gap-3">
                                    <button onClick={() => setShowAddAcc(false)} className="flex-1 py-4 text-slate-400 font-bold">ยกเลิก</button>
                                    <button onClick={() => {if(newAccName){db.ref('accounts').push({name: newAccName, color: 'from-pink-400'}); setNewAccName(''); setShowAddAcc(false);}}} className="flex-[2] py-4 bg-gradient-to-r from-pink-500 to-rose-500 text-white font-black rounded-2xl shadow-lg">สร้างเลย!</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker ลงทะเบียนสำเร็จ'))
                .catch(err => console.log('Service Worker ผิดพลาด:', err));
            });
        }
    </script>
</body>
</html>
