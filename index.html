<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Professional Wallet Tracker ✨</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@100;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Anuphan', sans-serif; -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#F1F5F9] min-h-screen text-slate-800 p-2 md:p-6">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyALcH0D-G0H6g0yfgLHrxKcYiHZAq7jAGs",
            authDomain: "monney-33caf.firebaseapp.com",
            databaseURL: "https://monney-33caf-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "monney-33caf",
            storageBucket: "monney-33caf.firebasestorage.app",
            messagingSenderId: "709336346002",
            appId: "1:709336346002:web:444bd02c294bd194d6e54b"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const App = () => {
            const [accounts, setAccounts] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [activeAcc, setActiveAcc] = useState('all');
            const [editingId, setEditingId] = useState(null);
            const [showAddAcc, setShowAddAcc] = useState(false);
            const [newAccName, setNewAccName] = useState('');
            const [formData, setFormData] = useState({ description: '', amount: '', type: 'expense', accountId: '', date: new Date().toISOString().split('T')[0] });

            useEffect(() => {
                db.ref('accounts').on('value', snap => {
                    const data = snap.val();
                    if (data) {
                        const list = Object.keys(data).map(k => ({id: k, ...data[k]}));
                        setAccounts(list);
                        if (!formData.accountId && list.length > 0) setFormData(f => ({...f, accountId: list[0].id}));
                    } else {
                        db.ref('accounts').push({name: 'บัญชีหลัก 💳'});
                    }
                });
                db.ref('transactions').on('value', snap => {
                    const data = snap.val();
                    if (data) setTransactions(Object.keys(data).map(k => ({id: k, ...data[k]})).reverse());
                });
            }, []);

            const exportExcel = () => {
                const wb = XLSX.utils.book_new();
                const summary = accounts.map(acc => {
                    const ts = transactions.filter(t => t.accountId === acc.id);
                    const inc = ts.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
                    const exp = ts.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
                    return { 'บัญชี': acc.name, 'รับ': inc, 'จ่าย': exp, 'คงเหลือ': inc - exp };
                });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(summary), "สรุปยอด");

                accounts.forEach(acc => {
                    const ts = transactions.filter(t => t.accountId === acc.id).sort((a,b) => new Date(a.date) - new Date(b.date));
                    if(ts.length > 0) {
                        let bal = 0;
                        const data = ts.map(t => {
                            bal += (t.type === 'income' ? t.amount : -t.amount);
                            return { 'วันที่': t.date, 'รายการ': t.description, 'รายรับ': t.type === 'income' ? t.amount : 0, 'รายจ่าย': t.type === 'expense' ? t.amount : 0, 'ยอดสะสม': bal };
                        });
                        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data), acc.name.substring(0, 30));
                    }
                });
                XLSX.writeFile(wb, `Wallet_Report.xlsx`);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.description || !formData.amount) return;
                const payload = {...formData, amount: parseFloat(formData.amount)};
                if (editingId) db.ref(`transactions/${editingId}`).update(payload);
                else db.ref('transactions').push(payload);
                setEditingId(null);
                setFormData({...formData, description: '', amount: ''});
            };

            const stats = useMemo(() => {
                const filtered = transactions.filter(t => activeAcc === 'all' || t.accountId === activeAcc);
                return filtered.reduce((acc, curr) => {
                    if (curr.type === 'income') { acc.in += curr.amount; acc.bal += curr.amount; }
                    else { acc.out += curr.amount; acc.bal -= curr.amount; }
                    return acc;
                }, { in: 0, out: 0, bal: 0 });
            }, [transactions, activeAcc]);

            const groupedTransactions = useMemo(() => {
                const filtered = transactions.filter(t => activeAcc === 'all' || t.accountId === activeAcc);
                const groups = {};
                filtered.forEach(t => {
                    if (!groups[t.date]) groups[t.date] = [];
                    groups[t.date].push(t);
                });
                return groups;
            }, [transactions, activeAcc]);

            return (
                <div className="max-w-7xl mx-auto space-y-6">
                    <header className="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm">
                        <h1 className="text-xl font-bold text-blue-800">📊 SMART WALLET</h1>
                        <button onClick={exportExcel} className="bg-emerald-600 text-white px-4 py-2 rounded-xl text-xs font-bold">EXCEL</button>
                    </header>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            <p className="text-xs font-bold text-slate-400 uppercase">Balance</p>
                            <p className="text-2xl font-bold">฿{stats.bal.toLocaleString()}</p>
                        </div>
                        <div className="bg-emerald-50 p-6 rounded-2xl border border-emerald-100">
                            <p className="text-xs font-bold text-emerald-600 uppercase">Income</p>
                            <p className="text-2xl font-bold text-emerald-700">฿{stats.in.toLocaleString()}</p>
                        </div>
                        <div className="bg-rose-50 p-6 rounded-2xl border border-rose-100">
                            <p className="text-xs font-bold text-rose-600 uppercase">Expense</p>
                            <p className="text-2xl font-bold text-rose-700">฿{stats.out.toLocaleString()}</p>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        <div className="lg:col-span-5 space-y-6">
                            <div className="bg-white p-6 rounded-2xl shadow-md border border-slate-200">
                                <h2 className="text-lg font-bold mb-4 border-l-4 border-blue-600 pl-3">{editingId ? 'แก้ไขรายการ' : 'บันทึกรายการ'}</h2>
                                <form onSubmit={handleSubmit} className="space-y-4">
                                    <div className="flex bg-slate-100 p-1 rounded-lg">
                                        <button type="button" onClick={() => setFormData({...formData, type: 'income'})} className={`flex-1 py-2 rounded-md font-bold text-sm ${formData.type === 'income' ? 'bg-white shadow text-emerald-600' : 'text-slate-500'}`}>รายรับ</button>
                                        <button type="button" onClick={() => setFormData({...formData, type: 'expense'})} className={`flex-1 py-2 rounded-md font-bold text-sm ${formData.type === 'expense' ? 'bg-white shadow text-rose-600' : 'text-slate-500'}`}>รายจ่าย</button>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <select value={formData.accountId} onChange={e => setFormData({...formData, accountId: e.target.value})} className="p-3 bg-slate-50 border rounded-lg text-sm">
                                            {accounts.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
                                        </select>
                                        <input type="date" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} className="p-3 bg-slate-50 border rounded-lg text-sm" />
                                    </div>
                                    <input type="text" placeholder="รายละเอียด..." value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-lg text-sm" />
                                    <input type="number" placeholder="0.00" value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} className="w-full p-4 bg-blue-50 border-2 border-blue-100 rounded-xl font-bold text-3xl text-center text-blue-700" />
                                    <button type="submit" className="w-full py-3 bg-blue-600 text-white font-bold rounded-lg shadow-lg">บันทึก</button>
                                </form>
                            </div>
                        </div>

                        <div className="lg:col-span-7 space-y-6">
                            <div className="bg-white p-6 rounded-2xl shadow-md border border-slate-200">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-lg font-bold">ประวัติรายการ</h2>
                                    <button onClick={() => setShowAddAcc(true)} className="bg-blue-800 text-white px-3 py-1.5 rounded-lg text-xs font-bold">+ บัญชี</button>
                                </div>
                                
                                <div className="flex gap-2 overflow-x-auto pb-4 mb-4 custom-scrollbar">
                                    <button onClick={() => setActiveAcc('all')} className={`px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap ${activeAcc === 'all' ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-500'}`}>ทั้งหมด</button>
                                    {accounts.map(a => (
                                        <div key={a.id} className="relative flex items-center bg-slate-100 rounded-full px-4 py-1.5 gap-2 transition-all">
                                            <button onClick={() => setActiveAcc(a.id)} className={`text-xs font-bold whitespace-nowrap ${activeAcc === a.id ? 'text-blue-600' : 'text-slate-500'}`}>{a.name}</button>
                                            <button onClick={() => {if(confirm('ลบบัญชีนี้?')) db.ref(`accounts/${a.id}`).remove()}} className="text-rose-400 hover:text-rose-600 text-xs">✕</button>
                                        </div>
                                    ))}
                                </div>

                                <div className="space-y-6">
                                    {Object.keys(groupedTransactions).sort((a,b) => new Date(b)-new Date(a)).map(date => (
                                        <div key={date} className="space-y-3">
                                            <p className="text-[11px] font-bold text-slate-400 border-b pb-1 uppercase">{date}</p>
                                            {groupedTransactions[date].map(t => (
                                                <div key={t.id} className="flex justify-between items-center p-3 bg-slate-50 rounded-xl group hover:bg-white border border-transparent hover:border-slate-200">
                                                    <div className="flex-1 min-w-0 pr-4">
                                                        <p className="font-bold text-sm truncate">{t.description}</p>
                                                        <p className="text-[10px] text-blue-500 font-bold uppercase">{accounts.find(a => a.id === t.accountId)?.name}</p>
                                                    </div>
                                                    <div className="flex items-center gap-3">
                                                        <p className={`font-bold text-sm ${t.type === 'income' ? 'text-emerald-600' : 'text-slate-800'}`}>
                                                            {t.type === 'income' ? '+' : '-'}฿{t.amount.toLocaleString()}
                                                        </p>
                                                        <div className="flex gap-2 opacity-0 group-hover:opacity-100 transition-all">
                                                            <button onClick={() => {setEditingId(t.id); setFormData(t); window.scrollTo(0,0)}} className="text-blue-500 text-xs font-bold">แก้ไข</button>
                                                            <button onClick={() => {if(confirm('ลบรายการ?')) db.ref(`transactions/${t.id}`).remove()}} className="text-rose-500 text-xs font-bold">ลบ</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    {showAddAcc && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4">
                            <div className="bg-white w-full max-w-xs p-8 rounded-2xl shadow-2xl">
                                <h3 className="text-lg font-bold text-center mb-6">เพิ่มกระเป๋าเงินใหม่</h3>
                                <input autoFocus type="text" value={newAccName} onChange={e => setNewAccName(e.target.value)} placeholder="ชื่อบัญชี..." className="w-full px-4 py-3 bg-slate-50 border rounded-xl font-bold text-center mb-6" />
                                <div className="flex gap-2">
                                    <button onClick={() => setShowAddAcc(false)} className="flex-1 py-2.5 text-slate-400 font-bold text-sm">ยกเลิก</button>
                                    <button onClick={() => {if(newAccName){db.ref('accounts').push({name: newAccName}); setNewAccName(''); setShowAddAcc(false);}}} className="flex-[2] py-2.5 bg-blue-600 text-white font-bold rounded-xl text-sm shadow-lg">บันทึก</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
