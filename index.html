<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>My Sweet Finance Diary ✨</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#F43F5E">
    <link rel="apple-touch-icon" href="icon-512.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@100;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body { 
            font-family: 'Anuphan', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            padding-bottom: env(safe-area-inset-bottom);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #FFC0CB; border-radius: 10px; }
        
        /* ปรับสไตล์ให้ดูละมุนขึ้นในทุกจอ */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="bg-[#FFF5F7] min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyALcH0D-G0H6g0yfgLHrxKcYiHZAq7jAGs",
            authDomain: "monney-33caf.firebaseapp.com",
            databaseURL: "https://monney-33caf-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "monney-33caf",
            storageBucket: "monney-33caf.firebasestorage.app",
            messagingSenderId: "709336346002",
            appId: "1:709336346002:web:444bd02c294bd194d6e54b"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const App = () => {
            const [accounts, setAccounts] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [activeAcc, setActiveAcc] = useState('all');
            const [editingId, setEditingId] = useState(null);
            const [showAddAcc, setShowAddAcc] = useState(false);
            const [newAccName, setNewAccName] = useState('');
            const [formData, setFormData] = useState({ description: '', amount: '', type: 'expense', accountId: '', date: new Date().toISOString().split('T')[0] });

            useEffect(() => {
                db.ref('accounts').on('value', snap => {
                    const data = snap.val();
                    if (data) {
                        const list = Object.keys(data).map(k => ({id: k, ...data[k]}));
                        setAccounts(list);
                        if (!formData.accountId && list.length > 0) setFormData(f => ({...f, accountId: list[0].id}));
                    } else {
                        db.ref('accounts').push({name: 'เงินสด 💵', color: 'from-pink-400 to-rose-300'});
                    }
                });
                db.ref('transactions').on('value', snap => {
                    const data = snap.val();
                    if (data) setTransactions(Object.keys(data).map(k => ({id: k, ...data[k]})).reverse());
                    else setTransactions([]);
                });
            }, []);

            const exportExcel = () => {
                const wb = XLSX.utils.book_new();
                const summaryData = accounts.map(acc => {
                    const accTrans = transactions.filter(t => t.accountId === acc.id);
                    const totalIn = accTrans.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
                    const totalOut = accTrans.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
                    return { 'ชื่อบัญชี': acc.name, 'รายรับรวม (฿)': totalIn, 'รายจ่ายรวม (฿)': totalOut, 'ยอดคงเหลือล่าสุด (฿)': totalIn - totalOut };
                });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(summaryData), "สรุปยอด");
                XLSX.writeFile(wb, "Report.xlsx");
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.description || !formData.amount) return;
                const payload = {...formData, amount: parseFloat(formData.amount)};
                if (editingId) db.ref(`transactions/${editingId}`).update(payload);
                else db.ref('transactions').push(payload);
                setEditingId(null);
                setFormData({...formData, description: '', amount: ''});
            };

            const stats = useMemo(() => {
                const filtered = transactions.filter(t => activeAcc === 'all' || t.accountId === activeAcc);
                return filtered.reduce((acc, curr) => {
                    if (curr.type === 'income') { acc.in += curr.amount; acc.bal += curr.amount; }
                    else { acc.out += curr.amount; acc.bal -= curr.amount; }
                    return acc;
                }, { in: 0, out: 0, bal: 0 });
            }, [transactions, activeAcc]);

            const groupedTransactions = useMemo(() => {
                const filtered = transactions.filter(t => activeAcc === 'all' || t.accountId === activeAcc);
                const groups = {};
                filtered.forEach(t => {
                    if (!groups[t.date]) groups[t.date] = [];
                    groups[t.date].push(t);
                });
                return groups;
            }, [transactions, activeAcc]);

            return (
                <div className="max-w-7xl mx-auto px-4 py-6 md:py-10 pb-32">
                    <header className="flex flex-col items-center mb-8">
                        <h1 className="text-3xl md:text-5xl font-black text-rose-500 drop-shadow-sm mb-2">Diary Finance ✨</h1>
                        <p className="text-xs md:text-sm font-bold text-pink-300 tracking-widest uppercase">Cloud Synchronization</p>
                    </header>
                    
                    {/* สรุปยอดเงิน: แถวเดียวในมือถือ กริตในจอใหญ่ */}
                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 md:gap-6 mb-8">
                        <div className="bg-white p-5 rounded-[1.5rem] md:rounded-[2rem] shadow-sm text-center border-b-4 border-pink-100">
                            <p className="text-2xl md:text-3xl font-black text-slate-700">฿{stats.bal.toLocaleString()}</p>
                            <p className="text-[10px] font-bold text-rose-300 uppercase mt-1">คงเหลือ</p>
                        </div>
                        <div className="bg-gradient-to-br from-emerald-400 to-teal-500 p-5 rounded-[1.5rem] md:rounded-[2rem] shadow-md text-white text-center">
                            <p className="text-2xl md:text-3xl font-black">฿{stats.in.toLocaleString()}</p>
                            <p className="text-[10px] font-bold opacity-80 uppercase mt-1">รายรับ</p>
                        </div>
                        <div className="bg-gradient-to-br from-rose-400 to-pink-500 p-5 rounded-[1.5rem] md:rounded-[2rem] shadow-md text-white text-center">
                            <p className="text-2xl md:text-3xl font-black">฿{stats.out.toLocaleString()}</p>
                            <p className="text-[10px] font-bold opacity-80 uppercase mt-1">รายจ่าย</p>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                        {/* ส่วนจดบันทึก: ในคอมพิวเตอร์จะลอยอยู่กับที่ (Sticky) */}
                        <div className="lg:col-span-5 order-1 lg:sticky lg:top-8">
                            <div className="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-xl border-4 border-white">
                                <h2 className="font-black text-xl mb-6 text-slate-700 flex items-center gap-2">
                                    {editingId ? '🪄 แก้ไขข้อมูล' : '📔 บันทึกรายการ'}
                                </h2>
                                <form onSubmit={handleSubmit} className="space-y-4">
                                    <div className="flex bg-slate-100 p-1.5 rounded-2xl">
                                        <button type="button" onClick={() => setFormData({...formData, type: 'income'})} className={`flex-1 py-3 rounded-xl font-bold text-sm transition-all ${formData.type === 'income' ? 'bg-white shadow-md text-emerald-500 scale-100' : 'text-slate-400 scale-95 opacity-60'}`}>รายรับ</button>
                                        <button type="button" onClick={() => setFormData({...formData, type: 'expense'})} className={`flex-1 py-3 rounded-xl font-bold text-sm transition-all ${formData.type === 'expense' ? 'bg-white shadow-md text-rose-500 scale-100' : 'text-slate-400 scale-95 opacity-60'}`}>รายจ่าย</button>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <select value={formData.accountId} onChange={e => setFormData({...formData, accountId: e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl font-bold text-slate-600 text-sm outline-none">
                                            {accounts.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
                                        </select>
                                        <input type="date" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl font-bold text-slate-500 text-sm outline-none" />
                                    </div>
                                    <input type="text" placeholder="พิมพ์รายการ..." value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none text-sm" />
                                    <input type="number" inputMode="decimal" placeholder="0.00" value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} className="w-full p-5 bg-pink-50 rounded-3xl font-black text-4xl text-center text-rose-500 outline-none" />
                                    <button type="submit" className="w-full py-4 bg-gradient-to-r from-pink-500 to-rose-500 text-white font-black rounded-2xl shadow-lg active:scale-95 transition-all">บันทึก ✨</button>
                                </form>
                            </div>
                        </div>

                        {/* ส่วนแสดงประวัติ */}
                        <div className="lg:col-span-7 order-2">
                            <div className="glass-card p-6 md:p-8 rounded-[2.5rem] border-4 border-white shadow-sm min-h-[400px]">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="font-black text-xl text-slate-700">ประวัติการใช้จ่าย</h2>
                                    <button onClick={() => setShowAddAcc(true)} className="px-4 py-2 bg-pink-500 text-white rounded-xl font-bold text-xs shadow-md">+ เพิ่มบัญชี</button>
                                </div>
                                
                                {/* ตัวเลือกบัญชี: ปัดซ้ายขวาได้ในมือถือ */}
                                <div className="flex gap-2 overflow-x-auto pb-4 mb-6 custom-scrollbar">
                                    <button onClick={() => setActiveAcc('all')} className={`px-5 py-2 rounded-xl text-[10px] font-black whitespace-nowrap ${activeAcc === 'all' ? 'bg-pink-500 text-white shadow-md' : 'bg-white text-pink-400'}`}>ทั้งหมด</button>
                                    {accounts.map(a => (
                                        <div key={a.id} className="relative group">
                                            <button onClick={() => setActiveAcc(a.id)} className={`px-5 py-2 rounded-xl text-[10px] font-black whitespace-nowrap transition-all ${activeAcc === a.id ? 'bg-white text-rose-500 ring-2 ring-rose-100 shadow-sm' : 'bg-white/40 text-slate-400'}`}>{a.name}</button>
                                            <button onClick={() => {if(confirm('ลบกระเป๋าเงิน?')) db.ref(`accounts/${a.id}`).remove()}} className="absolute -top-1 -right-1 w-4 h-4 bg-rose-500 text-white rounded-full text-[8px] opacity-0 group-hover:opacity-100 flex items-center justify-center">✕</button>
                                        </div>
                                    ))}
                                </div>

                                <div className="space-y-6">
                                    {Object.keys(groupedTransactions).sort((a, b) => new Date(b) - new Date(a)).map(date => (
                                        <div key={date} className="space-y-3">
                                            <div className="flex items-center gap-3">
                                                <span className="text-[10px] font-black text-pink-400 bg-pink-50 px-3 py-1 rounded-full">{date}</span>
                                                <div className="h-[1px] flex-1 bg-pink-100"></div>
                                            </div>
                                            {groupedTransactions[date].map(t => (
                                                <div key={t.id} className="p-4 bg-white/80 rounded-2xl flex justify-between items-center group active:bg-pink-50 transition-all border border-transparent hover:border-pink-200">
                                                    <div className="flex-1 min-w-0 pr-4">
                                                        <p className="font-bold text-slate-700 truncate text-sm">{t.description}</p>
                                                        <p className="text-[9px] text-pink-300 font-black uppercase tracking-tighter">{accounts.find(a => a.id === t.accountId)?.name || 'ทั่วไป'}</p>
                                                    </div>
                                                    <div className="flex items-center gap-3">
                                                        <p className={`font-black text-sm whitespace-nowrap ${t.type === 'income' ? 'text-emerald-500' : 'text-slate-600'}`}>
                                                            {t.type === 'income' ? '+' : '-'}฿{t.amount.toLocaleString()}
                                                        </p>
                                                        <div className="flex gap-1 md:opacity-0 group-hover:opacity-100">
                                                            <button onClick={() => {setEditingId(t.id); setFormData(t); window.scrollTo({top:0, behavior:'smooth'})}} className="p-1.5 text-indigo-300">✎</button>
                                                            <button onClick={() => {if(confirm('ลบรายการนี้?')) db.ref(`transactions/${t.id}`).remove()}} className="p-1.5 text-rose-300">✕</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Bottom Nav สำหรับมือถือ */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass-card rounded-[2rem] shadow-2xl border-2 border-white p-2 flex justify-around items-center lg:hidden z-40">
                        <button onClick={() => window.scrollTo({top:0, behavior:'smooth'})} className="flex flex-col items-center p-2 text-rose-500">
                            <span className="text-xl">📔</span>
                            <span className="text-[8px] font-black">บันทึก</span>
                        </button>
                        <button onClick={exportExcel} className="flex flex-col items-center p-2 text-emerald-500">
                            <span className="text-xl">📊</span>
                            <span className="text-[8px] font-black">รายงาน</span>
                        </button>
                    </nav>

                    {/* Modal เพิ่มบัญชี */}
                    {showAddAcc && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-rose-50/80 backdrop-blur-sm p-6">
                            <div className="bg-white w-full max-w-xs p-8 rounded-[3rem] shadow-2xl border-4 border-white text-center">
                                <h3 className="text-xl font-black text-slate-700 mb-6">เพิ่มกระเป๋าเงิน 🌈</h3>
                                <input autoFocus type="text" value={newAccName} onChange={e => setNewAccName(e.target.value)} placeholder="ชื่อบัญชี..." className="w-full px-6 py-4 bg-slate-50 rounded-2xl outline-none font-bold text-center mb-6" />
                                <div className="flex gap-2">
                                    <button onClick={() => setShowAddAcc(false)} className="flex-1 py-3 text-slate-300 font-bold text-sm">ปิด</button>
                                    <button onClick={() => {if(newAccName){db.ref('accounts').push({name: newAccName, color: 'from-pink-400'}); setNewAccName(''); setShowAddAcc(false);}}} className="flex-[2] py-3 bg-pink-500 text-white font-black rounded-2xl text-sm shadow-md">สร้างเลย!</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('PWA Ready!'))
                .catch(err => console.log('PWA Error', err));
            });
        }
    </script>
</body>
</html>
